name: Test backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

# 실제 배포는 이 워크플로우가 하지 않는다 — VM(KCLOUD 내부망)이 GitHub 호스팅 러너에서
# 직접 SSH로 닿지 않아(방화벽) 여기서 배포를 트리거할 수 없다. 대신 VM 자체가 systemd 타이머로
# 1분마다 origin/main을 폴링해 변경사항이 있으면 스스로 재배포한다
# (/opt/ai-champion/deploy.sh, ai-champion-deploy.timer). 이 워크플로우는 그 전에 main이
# 깨지지 않았는지만 확인한다.
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q
