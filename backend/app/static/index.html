<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Champion — 온보딩 · 진단 데모</title>
<style>
  :root { --bg:#f6f7f9; --card:#fff; --line:#e3e6ea; --ink:#1c2430; --sub:#67707c;
          --brand:#3d5afe; --brand-weak:#eef1ff; --l1:#12b76a; --l2:#f59e0b; --l3:#ef4444; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:15px/1.6 -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; }
  .wrap { max-width:860px; margin:0 auto; padding:28px 18px 80px; }
  h1 { font-size:22px; margin:0 0 4px; }
  .lead { color:var(--sub); margin:0 0 22px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px;
          padding:20px; margin-bottom:18px; }
  .card h2 { font-size:16px; margin:0 0 14px; display:flex; align-items:center; gap:8px; }
  .step { width:22px;height:22px;border-radius:50%;background:var(--brand);color:#fff;
          font-size:12px;display:inline-flex;align-items:center;justify-content:center; }
  label { display:block; font-size:13px; color:var(--sub); margin:12px 0 5px; }
  input[type=text], input[type=number], textarea, select {
    width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:9px;
    font:inherit; background:#fff; color:var(--ink); }
  textarea { min-height:84px; resize:vertical; }
  .row { display:flex; gap:12px; flex-wrap:wrap; }
  .row > div { flex:1; min-width:150px; }
  .chips { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
  .chip { padding:6px 12px; border:1px solid var(--line); border-radius:20px; cursor:pointer;
          font-size:13px; user-select:none; background:#fff; }
  .chip.on { background:var(--brand-weak); border-color:var(--brand); color:var(--brand); font-weight:600; }
  button { font:inherit; cursor:pointer; border:none; border-radius:9px; padding:10px 16px; font-weight:600; }
  .primary { background:var(--brand); color:#fff; }
  .primary:disabled { opacity:.5; cursor:default; }
  .ghost { background:#fff; border:1px solid var(--line); color:var(--ink); font-weight:500; }
  .link { background:none; color:var(--brand); padding:4px 0; font-weight:600; }
  table { width:100%; border-collapse:collapse; margin-top:8px; font-size:13px; }
  th, td { padding:6px 6px; text-align:left; border-bottom:1px solid var(--line); vertical-align:middle; }
  th { color:var(--sub); font-weight:500; }
  td select, td input { padding:6px 7px; }
  .del { color:var(--l3); background:none; padding:2px 6px; font-size:18px; line-height:1; }
  .toolbar { display:flex; gap:10px; align-items:center; margin-top:16px; flex-wrap:wrap; }
  .hint { font-size:12px; color:var(--sub); }
  .err { background:#fef2f2; border:1px solid #fecaca; color:#b91c1c; padding:12px 14px;
         border-radius:10px; margin:14px 0; white-space:pre-wrap; font-size:13px; }
  /* result */
  #result { display:none; }
  .gauge { display:flex; align-items:center; gap:10px; margin:7px 0; }
  .gauge .name { width:96px; font-size:13px; color:var(--sub); }
  .bar { flex:1; height:12px; background:#eef1f4; border-radius:6px; overflow:hidden; }
  .bar > span { display:block; height:100%; background:var(--brand); border-radius:6px; }
  .score { width:34px; font-variant-numeric:tabular-nums; font-weight:600; font-size:13px; }
  .axis-int { font-size:12px; color:var(--sub); margin:-3px 0 6px 106px; }
  .goalbox { background:var(--brand-weak); border-radius:10px; padding:14px 16px; margin:6px 0 2px; font-weight:600; }
  .meta { font-size:12px; color:var(--sub); margin-top:6px; }
  .fit { border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin:8px 0; font-size:13px; }
  .weekhead { font-weight:700; margin:18px 0 6px; }
  .task { border:1px solid var(--line); border-radius:11px; padding:13px 15px; margin:9px 0; }
  .task .top { display:flex; align-items:center; gap:8px; }
  .layer { font-size:11px; padding:2px 8px; border-radius:20px; color:#fff; }
  .task h4 { margin:0; font-size:15px; }
  .kv { font-size:13px; color:var(--sub); margin:6px 0 2px; }
  .guide { background:#fafbfc; border:1px solid var(--line); border-radius:9px; padding:10px 12px;
           font-size:13px; white-space:pre-wrap; margin-top:8px; }
  .badge { display:inline-block; background:#eef1f4; border-radius:6px; padding:1px 7px; font-size:12px; margin-right:5px; }
  .quote { border-left:3px solid var(--brand); padding:4px 12px; color:var(--sub); font-size:13px; margin:10px 0; }
  .spin { display:inline-block; width:15px;height:15px;border:2px solid #fff;border-top-color:transparent;
          border-radius:50%; animation:sp .7s linear infinite; vertical-align:-2px; margin-right:7px; }
  @keyframes sp { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <h1>AI Champion</h1>
  <p class="lead">온보딩 인터뷰(기능 1) → AX 성숙도 진단·목표(기능 2) → 로드맵(기능 3·4)까지 브라우저에서 한 번에.</p>

  <div id="form">
    <div class="card">
      <h2><span class="step">1</span> 기본 정보</h2>
      <div class="row">
        <div><label>업종</label><input id="industry" type="text" placeholder="예: D2C 뷰티·리빙 커머스"></div>
        <div style="max-width:120px"><label>팀 규모(명)</label><input id="team_size" type="number" min="1" value="8"></div>
      </div>
      <label>담당 업무 (복수 선택)</label>
      <div class="chips" id="work_categories"></div>
    </div>

    <div class="card">
      <h2><span class="step">2</span> AI 활용 수준 · 조직 환경</h2>
      <label>팀장님은 평소 AI를 어느 정도 쓰시나요?</label>
      <div class="chips" id="ai_level" data-single="1"></div>
      <div class="row">
        <div><label>회사 AI 가이드라인</label>
          <div class="chips" id="has_guideline" data-single="1"></div></div>
        <div><label>외부 AI(개인 ChatGPT 등) 사용</label>
          <div class="chips" id="external_ai" data-single="1"></div></div>
      </div>
      <label>사내 지정 AI 도구 (없으면 비워두세요)</label>
      <div class="chips" id="designated_tools"></div>
      <label>팀원 간 AI 활용 편차 (선택)</label>
      <input id="variance" type="text" placeholder="예: 2명은 잘 쓰고 3명은 안 씀">
    </div>

    <div class="card">
      <h2><span class="step">3</span> 반복 업무</h2>
      <label>어제 하루를 시간순으로 편하게 적어주세요. 저희가 반복 업무를 뽑아드려요.</label>
      <textarea id="narrative" placeholder="예: 아침에 SNS 카피를 쓰고, 고객 리뷰를 확인하고, 금요일마다 대시보드 보고 주간 성과 리포트를 정리해요…"></textarea>
      <div class="toolbar">
        <button class="ghost" id="btnExtract">🪄 AI로 업무 뽑기</button>
        <button class="ghost" id="btnAddRow">+ 직접 추가</button>
        <span class="hint" id="extractHint"></span>
      </div>
      <div id="tasksWrap" style="display:none; overflow-x:auto">
        <table>
          <thead><tr><th>업무</th><th>빈도</th><th>반복성</th><th>1회 소요</th><th>민감</th><th>현재 방식</th><th></th></tr></thead>
          <tbody id="taskRows"></tbody>
        </table>
      </div>
    </div>

    <div class="toolbar">
      <button class="primary" id="btnGenerate">📋 리포트 생성</button>
      <button class="link" id="btnSample">예시로 채우기</button>
      <button class="link" id="btnClear" style="color:var(--l3)">전체 지우기</button>
      <span class="hint">진단 · 리서치 · 로드맵 생성까지 30~60초 걸릴 수 있어요.</span>
    </div>
    <div id="formErr"></div>
  </div>

  <div id="result"></div>
</div>

<script>
const AI_LEVELS = ["안 씀","궁금해서 써봄","가끔 필요할 때 씀","업무에 적극 활용"];
const CATEGORIES = ["마케팅/콘텐츠","영업/고객대응","기획/전략","데이터/분석","구매/총무","개발/기술","인사/교육","기타"];
const TOOLS = ["Copilot","ChatGPT Enterprise","Gemini","사내 자체 도구"];
const FREQS = ["매일","주 1회 이상","월 1~3회","월 1회 이하"];
const DURATIONS = [["10분 안쪽",10],["30분쯤",30],["1시간쯤",60],["반나절 이상",240]];
const LAYER = {1:["Layer 1 · 반복정형","var(--l1)"],2:["Layer 2 · 판단보조","var(--l2)"],3:["Layer 3 · 전략","var(--l3)"]};

// Notion 발행 대상은 이 데모에서 항상 이 팀 하나뿐이라 워크스페이스 식별자를 입력받지 않는다 —
// 다른 워크스페이스로 바꾸고 싶으면 결과 카드의 "다른 워크스페이스로 전환"/"연결 해제"를 쓴다.
const ACCOUNT_ID = "default";

// ---- 새로고침해도 입력·리포트 유지 ----
const STORAGE_KEY = "aichampion_demo_state_v1";
function loadState() {
  try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; }
  catch (_) { return null; }
}
function saveState(extra = {}) {
  const prev = loadState() || {};
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...prev, form: snapshotForm(), ...extra }));
}

// ---- chip groups ----
function chips(id, values, single) {
  const el = document.getElementById(id);
  values.forEach(v => {
    const c = document.createElement("div");
    c.className = "chip"; c.textContent = v; c.dataset.val = v;
    c.onclick = () => {
      if (single) [...el.children].forEach(x => x.classList.remove("on"));
      c.classList.toggle("on");
    };
    el.appendChild(c);
  });
}
function chipVals(id){ return [...document.getElementById(id).querySelectorAll(".chip.on")].map(c=>c.dataset.val); }
function chipOne(id){ return chipVals(id)[0] ?? null; }
function setChips(id, vals){ [...document.getElementById(id).children].forEach(c=>c.classList.toggle("on", vals.includes(c.dataset.val))); }

chips("work_categories", CATEGORIES);
chips("ai_level", AI_LEVELS, true);
chips("has_guideline", ["없음","있음"], true);
chips("external_ai", ["허용","제한"], true);
chips("designated_tools", TOOLS);

// ---- task rows ----
function addRow(t={}) {
  document.getElementById("tasksWrap").style.display = "block";
  const tr = document.createElement("tr");
  const dur = DURATIONS.find(d => d[1] === (t.avg_time_minutes||30)) || DURATIONS[1];
  tr.innerHTML = `
    <td><input type="text" class="c-title" value="${(t.title||"").replace(/"/g,'&quot;')}" placeholder="업무명"></td>
    <td><select class="c-freq">${FREQS.map(f=>`<option ${f===(t.frequency||"주 1회 이상")?"selected":""}>${f}</option>`).join("")}</select></td>
    <td><select class="c-std">
      <option value="true" ${t.is_standardized?"selected":""}>거의 똑같이</option>
      <option value="false" ${t.is_standardized===false||t.is_standardized==null?"selected":""}>상황따라</option>
    </select></td>
    <td><select class="c-dur">${DURATIONS.map(d=>`<option value="${d[1]}" ${d[1]===dur[1]?"selected":""}>${d[0]}</option>`).join("")}</select></td>
    <td style="text-align:center"><input type="checkbox" class="c-sens" ${t.contains_sensitive_info?"checked":""}></td>
    <td><input type="text" class="c-method" value="${(t.current_method||"").replace(/"/g,'&quot;')}" placeholder="예: 엑셀 수기"></td>
    <td><button class="del" title="삭제">×</button></td>`;
  tr.querySelector(".del").onclick = () => tr.remove();
  document.getElementById("taskRows").appendChild(tr);
}
function collectTasks() {
  return [...document.querySelectorAll("#taskRows tr")].map(tr => ({
    title: tr.querySelector(".c-title").value.trim(),
    frequency: tr.querySelector(".c-freq").value,
    is_standardized: tr.querySelector(".c-std").value === "true",
    avg_time_minutes: Number(tr.querySelector(".c-dur").value),
    contains_sensitive_info: tr.querySelector(".c-sens").checked,
    current_method: tr.querySelector(".c-method").value.trim() || "(미확인)",
  })).filter(t => t.title);
}

// ---- 폼 상태 저장/복원 (새로고침 유지) ----
function snapshotForm() {
  return {
    industry: document.getElementById("industry").value,
    team_size: document.getElementById("team_size").value,
    work_categories: chipVals("work_categories"),
    ai_level: chipVals("ai_level"),
    has_guideline: chipVals("has_guideline"),
    external_ai: chipVals("external_ai"),
    designated_tools: chipVals("designated_tools"),
    variance: document.getElementById("variance").value,
    narrative: document.getElementById("narrative").value,
    tasks: collectTasks(),
  };
}
function restoreForm(snap) {
  if (!snap) return;
  document.getElementById("industry").value = snap.industry || "";
  document.getElementById("team_size").value = snap.team_size || 8;
  setChips("work_categories", snap.work_categories || []);
  setChips("ai_level", snap.ai_level || []);
  setChips("has_guideline", snap.has_guideline || []);
  setChips("external_ai", snap.external_ai || []);
  setChips("designated_tools", snap.designated_tools || []);
  document.getElementById("variance").value = snap.variance || "";
  document.getElementById("narrative").value = snap.narrative || "";
  document.getElementById("taskRows").innerHTML = "";
  (snap.tasks || []).forEach(addRow);
}

// ---- API ----
async function _errorMessage(r) {
  const txt = await r.text();
  try {
    const parsed = JSON.parse(txt);
    if (parsed && typeof parsed.detail === "string") return parsed.detail;
  } catch (_) { /* JSON이 아니면 원문 그대로 */ }
  return `${r.status} ${r.statusText}\n${txt}`;
}
async function api(path, body) {
  const r = await fetch(path, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
  if (!r.ok) throw new Error(await _errorMessage(r));
  return r.json();
}
async function apiGet(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(await _errorMessage(r));
  return r.json();
}
function showErr(where, e) {
  document.getElementById(where).innerHTML =
    `<div class="err">⚠️ ${e.message.includes("api_key")||e.message.includes("API key")||e.message.includes("GEMINI")
      ? "Gemini 호출에 실패했어요. 서버 .env의 GEMINI_API_KEY와 모델 이름을 확인해주세요.\n\n" : ""}${e.message}</div>`;
}

document.getElementById("btnExtract").onclick = async () => {
  const btn = document.getElementById("btnExtract");
  const nar = document.getElementById("narrative").value.trim();
  if (!nar) { document.getElementById("extractHint").textContent = "먼저 하루 일과를 적어주세요."; return; }
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>뽑는 중…';
  document.getElementById("formErr").innerHTML = "";
  try {
    const out = await api("/onboarding/extract-tasks", {day_narrative:nar, work_categories:chipVals("work_categories")});
    document.getElementById("taskRows").innerHTML = "";
    out.tasks.forEach(addRow);
    document.getElementById("extractHint").textContent = `${out.tasks.length}건 뽑았어요. 값을 확인·수정해주세요.`;
    saveState();
  } catch(e) { showErr("formErr", e); }
  btn.disabled = false; btn.textContent = "🪄 AI로 업무 뽑기";
};
document.getElementById("btnAddRow").onclick = () => addRow();

document.getElementById("btnSample").onclick = () => {
  document.getElementById("industry").value = "D2C 뷰티·리빙 커머스";
  document.getElementById("team_size").value = 8;
  setChips("work_categories", ["마케팅/콘텐츠"]);
  setChips("ai_level", ["가끔 필요할 때 씀"]);
  setChips("has_guideline", ["없음"]);
  setChips("external_ai", ["허용"]);
  setChips("designated_tools", []);
  document.getElementById("variance").value = "큼 — 2명 적극 활용, 3명 몇 번 써봄, 3명 미사용";
  document.getElementById("narrative").value = "아침엔 SNS·블로그 카피 초안을 쓰고, 고객 리뷰와 SNS 언급을 모니터링해요. 주중엔 광고 A/B 테스트 결과를 정리하고, 금요일마다 대시보드를 보고 주간 캠페인 성과 리포트를 만들어요. 격주로 경쟁사 조사를 하고, 월 2회 보도자료·뉴스레터 초안을 쓰고, 매주 예산 집행 승인 문서를 작성해요.";
  document.getElementById("taskRows").innerHTML = "";
  [["SNS/블로그 카피 초안 작성","매일",false,30,false,"직접 작성"],
   ["고객 리뷰·SNS 모니터링","매일",false,60,false,"채널별 수기 확인"],
   ["광고 A/B 테스트 결과 정리","주 1회 이상",true,60,false,"엑셀 수기 취합"],
   ["주간 캠페인 성과 리포트","주 1회 이상",true,60,true,"대시보드+엑셀 수기"],
   ["경쟁사 벤치마킹·시장 조사","월 1~3회",false,240,false,"웹 검색 수기 정리"],
   ["보도자료·뉴스레터 초안","월 1~3회",false,240,false,"직접 작성"],
   ["캠페인 예산 집행 승인 문서","주 1회 이상",true,60,true,"엑셀에 예산·단가 수기"]]
   .forEach(([title,frequency,is_standardized,avg_time_minutes,contains_sensitive_info,current_method]) =>
     addRow({title,frequency,is_standardized,avg_time_minutes,contains_sensitive_info,current_method}));
  document.getElementById("extractHint").textContent = "예시 팀으로 채웠어요. 바로 ‘리포트 생성’을 눌러보세요.";
  saveState();
};

document.getElementById("btnClear").onclick = () => {
  if (!confirm("입력한 내용과 생성된 리포트를 모두 지울까요?")) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
};

document.getElementById("btnGenerate").onclick = async () => {
  const btn = document.getElementById("btnGenerate");
  const tasks = collectTasks();
  document.getElementById("formErr").innerHTML = "";
  if (!tasks.length) { showErr("formErr", new Error("반복 업무를 최소 1건 이상 넣어주세요.")); return; }
  const answers = {
    industry: document.getElementById("industry").value.trim() || null,
    team_size: Number(document.getElementById("team_size").value) || 1,
    work_categories: chipVals("work_categories"),
    ai_adoption_level: chipOne("ai_level") || "안 씀",
    has_ai_guideline: chipOne("has_guideline") === "있음",
    designated_ai_tools: chipVals("designated_tools"),
    external_ai_allowed: chipOne("external_ai") === "허용",
    ai_usage_variance: document.getElementById("variance").value.trim(),
    day_narrative: "",
    task_details: tasks,
    member_tags: [],
  };
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>진단·로드맵 생성 중…';
  try {
    const rep = await api("/report/generate", answers);
    renderReport(rep);
    saveState({report: rep});
  } catch(e) { showErr("formErr", e); }
  btn.disabled = false; btn.textContent = "📋 리포트 생성";
};

// 어떤 입력이든(칩 클릭·텍스트·표 편집) 잠시 후 자동 저장
let _saveDebounce;
function scheduleSave() {
  clearTimeout(_saveDebounce);
  _saveDebounce = setTimeout(() => saveState(), 300);
}
document.getElementById("form").addEventListener("input", scheduleSave);
document.getElementById("form").addEventListener("click", scheduleSave);

// ---- render ----
function esc(s){ return (s??"").toString().replace(/[&<>]/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m])); }
function renderReport(rep, opts = {}) {
  const m = rep.maturity, g = rep.goal, r = rep.roadmap;
  const gauges = m.axis_scores.map(s => `
    <div class="gauge"><span class="name">${esc(s.axis)}</span>
      <span class="bar"><span style="width:${s.score/5*100}%"></span></span>
      <span class="score">${s.score}/5</span></div>
    <div class="axis-int">${esc(s.interpretation)}</div>`).join("");
  const bench = m.benchmark ? `<div class="quote">“${esc(m.benchmark.comment)}” — ${esc(m.benchmark.source)}</div>` : "";
  const oc = g.org_constraints;
  const fits = (r.fitness_assessment||[]).map(f =>
    `<div class="fit"><b>${esc(f.task_candidate)}</b> — ${esc(f.verdict)}<br><span class="hint">${esc(f.reason)}</span></div>`).join("");

  const roleByTask = {};
  (r.role_reassignment_suggestions||[]).forEach(s => (roleByTask[s.task_id]=roleByTask[s.task_id]||[]).push(s));
  const metricByTask = {};
  (r.metrics||[]).forEach(x => (metricByTask[x.task_id]=metricByTask[x.task_id]||[]).push(x));

  const weeks = [...new Set(r.tasks.map(t=>t.week))].sort((a,b)=>a-b);
  const roadmap = weeks.map(w => `
    <div class="weekhead">${w}주차</div>
    ${r.tasks.filter(t=>t.week===w).map(t=>{
      const [ltxt,lcol] = LAYER[t.layer] || ["Layer","#888"];
      const role = (roleByTask[t.task_id]||[]).map(s=>`<div class="kv">🙋 ${esc((s.assigned_member_ids||[]).join(", "))} — ${esc(s.reason)} <i>(${esc(s.disclaimer)})</i></div>`).join("");
      const met = (metricByTask[t.task_id]||[]).map(x=>`<div class="kv">📈 ${esc(x.metric_name)}: ${esc(x.baseline_value)}${esc(x.unit)} → ${esc(x.target_value)}${esc(x.unit)}</div>`).join("");
      return `<div class="task">
        <div class="top"><span class="layer" style="background:${lcol}">${ltxt}</span><h4>${esc(t.title)}</h4></div>
        <div class="kv">난이도 ${esc(t.difficulty)} · 예상 ${esc(t.est_time)} · 기대효과: ${esc(t.expected_effect)}</div>
        <div class="kv">${(t.tools_needed||[]).map(x=>`<span class="badge">${esc(x)}</span>`).join("")}</div>
        ${t.detailed_guide ? `<div class="guide">${esc(t.detailed_guide)}</div>` : ""}
        <div class="kv">⚠️ ${esc(t.failure_risk)}</div>${role}${met}
      </div>`;
    }).join("")}`).join("");

  const res = document.getElementById("result");
  res.style.display = "block";
  res.innerHTML = `
    <div class="card">
      <h2>🧭 우리 팀 AX 성숙도 진단</h2>
      <p class="hint" style="margin-top:-6px">${esc(m.summary)}</p>
      ${gauges}
      <div class="kv">먼저 손보면 좋은 순서: <b>${(m.priority_axes||[]).map(esc).join(" → ")}</b></div>
      ${bench}
    </div>
    <div class="card">
      <h2>🚩 이번 목표</h2>
      <div class="goalbox">${esc(g.goal_text)}</div>
      <div class="meta">허용 도구: ${(oc.allowed_tools||[]).map(esc).join(", ")||"없음"}
        · 연동: ${(oc.integrated_systems||[]).map(esc).join(", ")||"없음"}
        · 외부 AI: ${oc.external_ai_allowed?"허용":"제한"} · 보안: ${esc(oc.security_level)}</div>
    </div>
    <div class="card">
      <h2>🔍 이 업무들, AI로 풀어도 될까요?</h2>${fits||"<span class='hint'>판정 결과 없음</span>"}
    </div>
    <div class="card">
      <h2>🗺️ 이번 로드맵 ${r.research_status!=="ok"?"<span class='badge'>외부 근거 일부만 확보</span>":""}</h2>
      ${roadmap||"<span class='hint'>생성된 task 없음</span>"}
    </div>
    <div class="card">
      <h2>📤 Notion에 발행</h2>
      <p class="hint" style="margin-top:-6px">이 로드맵을 실제 Notion 워크스페이스(팀원·Opportunity Map·Roadmap 데이터베이스)로 보냅니다.</p>
      <div id="connectStatus" class="hint" style="margin:10px 0"></div>
      <div class="toolbar">
        <button class="primary" id="btnPublish">📤 발행하기</button>
      </div>
      <div id="publishResult"></div>
    </div>`;

  const connectUrl = `/notion/connect?account_id=${encodeURIComponent(ACCOUNT_ID)}`;

  async function refreshConnectStatus() {
    const box = document.getElementById("connectStatus");
    box.textContent = "연결 상태 확인 중…";
    try {
      const s = await apiGet(`/notion/status?account_id=${encodeURIComponent(ACCOUNT_ID)}`);
      box.innerHTML = s.connected
        ? `✅ '${esc(s.workspace_name || ACCOUNT_ID)}' 워크스페이스에 연결되어 있어요. ` +
          `<a href="${connectUrl}" target="_blank">다른 워크스페이스로 전환</a> · ` +
          `<a href="#" id="btnDisconnect">연결 해제</a>`
        : `⚠️ 아직 Notion 계정이 연결되지 않았어요. ` +
          `<a href="${connectUrl}" target="_blank">지금 연결하기</a> ` +
          `(연결 화면에서 페이지 공유까지 마친 뒤, 이 탭으로 돌아와 <a href="#" id="btnRecheck">연결 확인</a>을 눌러주세요)`;
      if (s.connected) {
        document.getElementById("btnDisconnect").onclick = async (ev) => {
          ev.preventDefault();
          await fetch(`/notion/connection?account_id=${encodeURIComponent(ACCOUNT_ID)}`, {method:"DELETE"});
          refreshConnectStatus();
        };
      } else {
        document.getElementById("btnRecheck").onclick = (ev) => { ev.preventDefault(); refreshConnectStatus(); };
      }
    } catch (e) {
      box.textContent = "연결 상태를 확인하지 못했어요.";
    }
  }
  refreshConnectStatus();

  document.getElementById("btnPublish").onclick = async () => {
    const btn = document.getElementById("btnPublish");
    const box = document.getElementById("publishResult");
    box.innerHTML = "";
    btn.disabled = true; btn.innerHTML = '<span class="spin"></span>발행 중…';
    try {
      const out = await api("/roadmap/publish", {
        goal: g, roadmap: r, onboarding: rep.onboarding, account_id: ACCOUNT_ID,
      });
      box.innerHTML = `<div class="goalbox">✅ 발행 완료! <a href="${esc(out.notion_url)}" target="_blank">${esc(out.notion_url)}</a></div>`;
    } catch (e) {
      const needsConnect = e.message.includes("연결되어 있지 않습니다") || e.message.includes("공유한 페이지가 없습니다");
      box.innerHTML = needsConnect
        ? `<div class="err">⚠️ Notion과 연결되어 있지 않습니다.<br>먼저 <a href="${connectUrl}" target="_blank">Notion 계정을 연결</a>한 뒤 다시 시도해주세요.</div>`
        : `<div class="err">⚠️ ${esc(e.message)}</div>`;
      if (needsConnect) refreshConnectStatus();
    }
    btn.disabled = false; btn.textContent = "📤 발행하기";
  };

  if (opts.scroll !== false) res.scrollIntoView({behavior:"smooth"});
}

// ---- 페이지 로드 시 저장된 입력·리포트 복원 ----
(function restoreOnLoad() {
  const saved = loadState();
  if (!saved) return;
  if (saved.form) restoreForm(saved.form);
  if (saved.report) renderReport(saved.report, {scroll:false});
})();
</script>
</body>
</html>
